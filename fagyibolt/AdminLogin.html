<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bejelentkezés - Édes Álmok</title>
    <link rel="stylesheet" href="Fagyibolt.css">
</head>
<body>

<header class="header">
        <div class="top-bar">
            <div class="logo">
                <big>🍦</big>
                <div>
                    <h1>Édes Álmok</h1>
                    <p>Fagylaltozó rendelési rendszer</p>
                </div>
            </div>
            <div class="date-box">
                📅<span id="date"></span>
            </div>
        </div>
</header>

<nav class="navbar">
        <ul>
            <li><a href="Főoldal.html">🏠Főoldal</a></li>
            <li><a href="Galéria.html">📷Galéria</a></li>
            <li><a href="Rólunk.html">💬Rólunk</a></li>
            <li><a href="Allergének.html">⚠️Allergének</a></li>
            <li><a href="Rendelés.html">🛒Rendelés</a></li>
            <li><a href="Rendelések.html">📝Rendelések</a></li>
            <li><a href="GYIK.html">❓GYIK</a></li>
            <li><a href="Kapcsolat.html">📞Kapcsolat</a></li>
            <li><a href="AdminLogin.html" class="active">👑Admin</a></li>
        </ul>
</nav>

<div id="loginPage">
        <h1>Admin Login</h1>
        <input type="text" id="username" placeholder="felhasználónév"><br><br>
        <input type="password" id="password" placeholder="jelszó"><br><br>
        <button onclick="login()">Bejelentkezés</button>
        <p id="message"></p>
</div>

<div id="dashboard" class="hidden">
        <h2>Admin Panel</h2>
        <button onclick="logout()">Kijelentkezés</button>
        
    <div>
        <button onclick="showPage('orders')">Rendelések</button>
        <button onclick="showPage('flavors')">Fagylaltok</button>
        <button onclick="showPage('allergens')">Allergének</button>
    </div>

    <div id="content">
        <h3 id="pageTitle"></h3>
        <div id="pageContent"></div>
    </div>
</div>

<script>
        function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let message = document.getElementById("message");

            fetch("http://localhost:3000/api/admin/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    message.textContent = "Sikeres bejelentkezés";
                    document.getElementById("loginPage").classList.add("hidden");
                    document.getElementById("dashboard").classList.remove("hidden");
                    showPage("orders");
                } else {
                    message.textContent = "Hibás próbálkozás";
                }
            })
            .catch(error => {
                message.textContent = "Hálózati hiba";
            });
        }

        function showPage(page) {
            let title = document.getElementById("pageTitle");
            let content = document.getElementById("pageContent");

            if (page === "orders") {
                title.textContent = "Rendelések";
                fetch("http://localhost:3000/api/rendelesek")
                    .then(response => response.json())
                    .then(data => {
                        let html = "";
                        for (let i = 0; i < data.length; i++) {
                            html += "<p>" + data[i].nev + " - " + data[i].telefonszam + " - " + data[i].vegosszeg + " Ft - " + data[i].datum + "</p>";
                        }
                        content.innerHTML = html;
                    })
                    .catch(error => {
                        content.innerHTML = "<p>Hiba a rendelések betöltésekor</p>";
                    });
            }
            
            if (page === "flavors") {
                title.textContent = "Fagylaltok";
                fetch("http://localhost:3000/api/fagylaltok")
                    .then(response => response.json())
                    .then(data => {
                        let html = "";
                        for (let i = 0; i < data.length; i++) {
                            html += "<p>" + data[i].nev + " - " + data[i].ar_kis + "/" + data[i].ar_nagy + " Ft</p>";
                        }
                        content.innerHTML = html;
                    })
                    .catch(error => {
                        content.innerHTML = "<p>Hiba a fagylaltok betöltésekor</p>";
                    });
            }
            
            if (page === "allergens") {
                title.textContent = "Allergének";
                fetch("http://localhost:3000/api/allergenek")
                    .then(response => response.json())
                    .then(data => {
                        let html = "";
                        for (let i = 0; i < data.length; i++) {
                            html += "<p>" + data[i].termek + ": " + data[i].allergenek + "</p>";
                        }
                        content.innerHTML = html;
                    })
                    .catch(error => {
                        content.innerHTML = "<p>Hiba az allergének betöltésekor</p>";
                    });
            }
        }

        function logout() {
            document.getElementById("dashboard").classList.add("hidden");
            document.getElementById("loginPage").classList.remove("hidden");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("message").textContent = "";
        }

        document.getElementById("date").textContent = new Date().getFullYear() + "." + (new Date().getMonth() + 1) + "." + new Date().getDate() + ".";
</script>

<style>
        .hidden {
            display: none;
        }
        #loginPage {
            text-align: center;
            margin-top: 50px;
        }
        #loginPage input, #loginPage button {
            padding: 8px;
            margin: 5px;
        }
        #dashboard {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        #dashboard button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }
        #content {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
</style>
</body>
</html>
