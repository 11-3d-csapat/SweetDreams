<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦Rendelés - Édes Álmok</title>
    <link rel="stylesheet" href="Fagyibolt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="top-bar">
            <div class="logo">
                <big>🍦</big>
                <div>
                    <h1>Édes Álmok</h1>
                    <p>Fagylaltozó rendelési rendszer</p>
                </div>
            </div>
            <div class="date-box">
                📅<span id="date"></span>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="Főoldal.html">🏠Főoldal</a></li>
            <li><a href="Galéria.html">📷Galéria</a></li>
            <li><a href="Rólunk.html">💬Rólunk</a></li>
            <li><a href="Allergének.html">⚠️Allergének</a></li>
            <li><a href="Rendelés.html" class="active">🛒Rendelés</a></li>
            <li><a href="Rendelések.html">📝Rendelések</a></li>
            <li><a href="GYIK.html">❓GYIK</a></li>
            <li><a href="Kapcsolat.html">📞Kapcsolat</a></li>
        </ul>
    </nav>

    <section id="Order">
        <h1 id="neworder">Új rendelés</h1>
        
        <div class="rendeles-form">
            <p>
                <label>Rendelő neve *</label>
                <input type="text" id="fullname" placeholder="Pl. Kovács János">
            </p>
            
            <p>
                <label>Telefonszám *</label>
                <input type="text" id="telnumber" placeholder="Pl. 06301234567">
            </p>

            <p>
                <label>Gombócok száma</label>
                <input type="number" id="gomboc" value="1" min="1" max="10">
            </p>

            <p>
                <label>Végösszeg (Ft)</label>
                <input type="text" id="vegosszeg" value="450" readonly>
            </p>

            <button onclick="rendelesLeadasa()" class="primary">📦 Rendelés leadása</button>
            <div id="valasz" style="margin-top: 20px; padding: 10px;"></div>
        </div>
    </section>

    <section class="hero">
        <h3>Kiegészítők</h3>
        <div class="tags">
            <span>Cukorszórás (+200 Ft)</span>
            <span>Roletti (+300 Ft)</span>
            <span>Sima tölcsér (+150 Ft)</span>
            <span>Édes tölcsér (+150 Ft)</span>
        </div>
    </section>

    <script>
        document.getElementById('gomboc').addEventListener('input', function() {
            const db = this.value;
            const ar = db * 450;
            document.getElementById('vegosszeg').value = ar;
        });

        function rendelesLeadasa() {
            const nev = document.getElementById("fullname").value;
            const tel = document.getElementById("telnumber").value;
            const osszeg = document.getElementById("vegosszeg").value;
            const valaszDiv = document.getElementById("valasz");

            if (!nev || !tel) {
                valaszDiv.innerHTML = "❌ Add meg a neved és telefonszámod!";
                valaszDiv.style.color = "red";
                return;
            }

            fetch('/rendeles', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    nev: nev,
                    telefonszam: tel,
                    osszeg: parseInt(osszeg)
                })
            })
            .then(response => response.text())
            .then(data => {
                valaszDiv.innerHTML = "✅ " + data;
                valaszDiv.style.color = "green";
                
                document.getElementById("fullname").value = "";
                document.getElementById("telnumber").value = "";
                document.getElementById("gomboc").value = "1";
                document.getElementById("vegosszeg").value = "450";
            })
            .catch(error => {
                valaszDiv.innerHTML = "❌ Hiba: " + error;
                valaszDiv.style.color = "red";
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            const datum = now.getFullYear() + '.' + 
                         (now.getMonth() + 1) + '.' + 
                         now.getDate() + '.';
            document.getElementById('date').textContent = datum;
        });
    </script>

</body>
</html>
