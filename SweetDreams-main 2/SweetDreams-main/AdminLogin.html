<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin bejelentkezés - Édes Álmok</title>
    <link rel="stylesheet" href="Fagyibolt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container h2 {
            color: #e91e63;
            margin-bottom: 20px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-container button:hover {
            background: #c2185b;
        }
        .error-message {
            color: red;
            margin-top: 15px;
        }
        .admin-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="top-bar">
            <div class="logo">
                <big>🍦</big>
                <div>
                    <h1>Édes Álmok</h1>
                    <p>Fagylaltozó rendelési rendszer</p>
                </div>
            </div>
            <div class="date-box">
                📅<span id="date"></span>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="Főoldal.html">🏠Főoldal</a></li>
            <li><a href="Galéria.html">📷Galéria</a></li>
            <li><a href="Rólunk.html">💬Rólunk</a></li>
            <li><a href="Allergének.html">⚠️Allergének</a></li>
            <li><a href="Rendelés.html">🛒Rendelés</a></li>
            <li><a href="Rendelések.html">📝Rendelések</a></li>
            <li><a href="GYIK.html">❓GYIK</a></li>
            <li><a href="Kapcsolat.html">📞Kapcsolat</a></li>
            <li><a href="AdminLogin.html" class="active">👑Admin</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="admin-icon">👑</div>
        <h2>Admin bejelentkezés</h2>
        <input type="text" id="adminUser" placeholder="Felhasználónév">
        <input type="password" id="adminPass" placeholder="Jelszó">
        <button onclick="adminLogin()">Bejelentkezés</button>
        <div id="loginError" class="error-message"></div>
    </div>

    <script>
        const ADMIN_CREDENTIALS = {
            username: "admin",
            password: "admin123"
        };

        function adminLogin() {
            const username = document.getElementById("adminUser").value;
            const password = document.getElementById("adminPass").value;
            const errorDiv = document.getElementById("loginError");

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                sessionStorage.setItem("adminLoggedIn", "true");
                sessionStorage.setItem("adminName", username);
                window.location.href = "AdminPanel.html";
            } else {
                errorDiv.textContent = "Hibás felhasználónév vagy jelszó!";
                document.getElementById("adminUser").style.borderColor = "red";
                document.getElementById("adminPass").style.borderColor = "red";
                
                setTimeout(() => {
                    document.getElementById("adminUser").style.borderColor = "#ddd";
                    document.getElementById("adminPass").style.borderColor = "#ddd";
                }, 2000);
            }
        }

        const now = new Date();
        document.getElementById('date').textContent = now.getFullYear() + '.' + 
                     (now.getMonth() + 1) + '.' + 
                     now.getDate() + '.';
    </script>
</body>
</html>
